name: keep-alive

# Keeps the Render free-tier instance warm during working hours so users don't
# hit the ~50-60s cold start. Pings the public /healthz endpoint (no auth, no
# data load). Outside the window the instance is allowed to spin down.
on:
  schedule:
    # every 10 min, 03:00-17:50 UTC = ~08:30-23:20 IST -> covers 9am-11pm IST, all 7 days
    - cron: '*/10 3-17 * * *'
  workflow_dispatch: {}

permissions:
  contents: write   # for the once-a-day heartbeat commit below

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Ping /healthz (keep Render instance warm)
        run: |
          url="https://manpower-dashboard-mt5r.onrender.com/healthz"
          for i in 1 2 3; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 120 "$url") || code="000"
            echo "attempt $i -> HTTP $code"
            [ "$code" = "200" ] && break
            sleep 10
          done

      - name: Daily heartbeat commit (prevents GitHub auto-disabling the schedule after 60 days idle)
        run: |
          today=$(date -u +%F)
          if [ "$(cat heartbeat.txt 2>/dev/null)" != "$today" ]; then
            echo "$today" > heartbeat.txt
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add heartbeat.txt
            git commit -m "heartbeat $today"
            git push
          else
            echo "heartbeat already current ($today)"
          fi
